services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - api
      - webapi

  client:
    build:
      context: ./client
    container_name: client
    restart: always
    ports:
      - "4200:4200"
    depends_on:
      - api
      - webapi

  api:
    build:
      context: ./nodeapi
    container_name: api
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - emongo

  webapi:
    build:
      context: ./javaapi
    container_name: webapi
    restart: always
    ports:
      - "9000:9000"
    depends_on:
      - emartdb

  emongo:
    image: mongo:4
    container_name: emongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: epoc

  emartdb:
    image: mysql:8.0.33
    container_name: emartdb
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: emartdbpass
      MYSQL_DATABASE: books
    volumes:
      - emartdb_data:/var/lib/mysql

volumes:
  emartdb_data: